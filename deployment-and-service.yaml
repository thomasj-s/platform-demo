apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-demo-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-demo
  template:
    metadata:
      labels:
        app: platform-demo
    spec:
      containers:
      - name: demo-container
        image: platform-demo:latest
        ports:
        - containerPort: 8000